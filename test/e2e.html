<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Michify e2e smoke test</title></head>
<!--
  Drives the real app in an iframe through its actual event handlers:
  paste an image, rotate it, undo/redo, autosave. Serve the repo with any
  static server and open this page; results appear below the iframe.
  (The /__report fetch is for automated runs and fails silently otherwise.)
-->
<body>
<iframe id="app" src="../index.html" style="width:1200px;height:900px"></iframe>
<pre id="out">running…</pre>
<script>
const out = [];
function report() { try { fetch('/__report', { method: 'POST', body: out.join('\n') }); } catch {} }
function log(name, ok, extra) { out.push((ok ? 'ok   ' : 'FAIL ') + name + (extra ? ' :: ' + extra : '')); report(); }
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
out.push('harness loaded'); report();
async function makeImageFile(w, h) {
  const c = document.createElement('canvas'); c.width = w; c.height = h;
  const ctx = c.getContext('2d'); ctx.fillStyle = 'red'; ctx.fillRect(0, 0, w, h);
  const blob = await new Promise(r => c.toBlob(r, 'image/png'));
  return new File([blob], 't.png', { type: 'image/png' });
}
window.addEventListener('load', async () => {
  await sleep(500);
  const fr = document.getElementById('app').contentWindow;
  const doc = fr.document;
  try {
    log('renders 9 pockets', doc.querySelectorAll('.pocket').length === 9);
    log('add-image input exists', !!doc.getElementById('add-image-file'));

    // Hints toggle hides all info texts and persists
    const hintsCb = doc.getElementById('hints-toggle');
    log('hints on by default', hintsCb.checked && !doc.body.classList.contains('hints-hidden'));
    hintsCb.checked = false;
    fr.updateHintsVisibility();
    const infoEl = doc.querySelector('#sidebar .info');
    log('hints hidden after toggle',
        doc.body.classList.contains('hints-hidden') &&
        fr.getComputedStyle(infoEl).display === 'none' &&
        fr.localStorage.getItem('michify-hints') === '0');
    hintsCb.checked = true;
    fr.updateHintsVisibility();

    // Expandable info hints (details/summary)
    const det = doc.querySelector('details.info');
    log('info details collapsed by default', !!det && !det.open);
    det.querySelector('summary').dispatchEvent(new fr.MouseEvent('click', { bubbles: true, cancelable: true }));
    await sleep(50);
    log('info expands on summary click', det.open);
    det.open = false;

    // Collapsible sidebar sections
    const qualityH2 = doc.querySelector('h2[data-section="quality"]');
    log('image quality collapsed by default', qualityH2.classList.contains('collapsed'));
    fr.toggleSection('dimensions');
    const dimsH2 = doc.querySelector('h2[data-section="dimensions"]');
    log('dimensions collapse with summary',
        dimsH2.classList.contains('collapsed') &&
        fr.getComputedStyle(dimsH2.nextElementSibling).display === 'none' &&
        doc.getElementById('dims-summary').textContent.indexOf('68×93') >= 0,
        'summary=' + doc.getElementById('dims-summary').textContent);
    fr.toggleSection('dimensions');
    log('dimensions expand again', !dimsH2.classList.contains('collapsed'));

    // Change rows to 4, then undo
    doc.getElementById('rows').value = 4;
    fr.updateBinder();
    log('rows=4 renders 12 pockets', doc.querySelectorAll('.pocket').length === 12);
    fr.undoAction();
    log('undo restores 9 pockets', doc.querySelectorAll('.pocket').length === 9,
        'pockets=' + doc.querySelectorAll('.pocket').length + ' rowsInput=' + doc.getElementById('rows').value);

    // Select pocket (0,0) and paste an image from the "clipboard"
    doc.querySelector('.pocket[data-row="0"][data-col="0"]').dispatchEvent(new fr.MouseEvent('click', { bubbles: true }));
    const file = await makeImageFile(400, 200); // ratio 2
    const dt = new fr.DataTransfer();
    dt.items.add(file);
    doc.dispatchEvent(new fr.ClipboardEvent('paste', { clipboardData: dt, bubbles: true, cancelable: true }));
    await sleep(700);
    let imgEl = doc.querySelector('img[data-slot-key="0,0"]');
    log('pasted image renders', !!imgEl);
    // cover fit of a ratio-2 image in a 68x93 slot: widthMm = 186 -> 558px at 100% zoom
    log('cover fit width 558px', imgEl && Math.abs(parseFloat(imgEl.style.width) - 558) < 1,
        imgEl && ('width=' + imgEl.style.width + ' left=' + imgEl.style.left));

    // Rotate 90 degrees via the properties panel
    doc.querySelector('.pocket[data-row="0"][data-col="0"]').dispatchEvent(new fr.MouseEvent('click', { bubbles: true }));
    doc.getElementById('img-rotate').value = '90';
    fr.updateImageProps();
    await sleep(100);
    imgEl = doc.querySelector('img[data-slot-key="0,0"]');
    log('rotate 90 transform', imgEl && imgEl.style.transform === 'rotate(90deg)', imgEl && imgEl.style.transform);
    // element width becomes fw*ratio = 372mm -> 1116px, left shifts to (x+fw)*3 = 381px
    log('rotate 90 element width 1116px', imgEl && Math.abs(parseFloat(imgEl.style.width) - 1116) < 1,
        imgEl && ('width=' + imgEl.style.width));
    log('rotate 90 left compensation 381px', imgEl && Math.abs(parseFloat(imgEl.style.left) - 381) < 1,
        imgEl && ('left=' + imgEl.style.left));

    // Regression: Delete must work while the Rotate dropdown still has focus
    const rotSel = doc.getElementById('img-rotate');
    rotSel.focus();
    rotSel.dispatchEvent(new fr.KeyboardEvent('keydown', { key: 'Delete', bubbles: true }));
    await sleep(50);
    log('Delete works with rotate dropdown focused', !doc.querySelector('img[data-slot-key]'));
    fr.undoAction(); // restore the rotated image for the next checks
    await sleep(50);
    log('undo restores deleted image', !!doc.querySelector('img[data-slot-key="0,0"]'));

    // Undo rotate, then undo paste
    fr.undoAction();
    await sleep(50);
    imgEl = doc.querySelector('img[data-slot-key="0,0"]');
    log('undo rotate back to 0', imgEl && imgEl.style.transform === 'rotate(0deg)', imgEl && imgEl.style.transform);
    fr.undoAction();
    await sleep(50);
    log('undo paste removes image', !doc.querySelector('img[data-slot-key]'));

    // Redo brings the image back and autosave persists it
    fr.redoAction();
    await sleep(50);
    log('redo restores image', !!doc.querySelector('img[data-slot-key="0,0"]'));
    await sleep(2200); // autosave debounce is 1.5s
    const saved = await Promise.race([
      (async () => {
        const db = await new Promise((res, rej) => {
          const rq = indexedDB.open('michify', 1);
          rq.onsuccess = () => res(rq.result);
          rq.onerror = () => rej(rq.error);
        });
        const val = await new Promise((res, rej) => {
          const tx = db.transaction('autosave', 'readonly');
          const rq = tx.objectStore('autosave').get('current');
          rq.onsuccess = () => res(rq.result);
          rq.onerror = () => rej(rq.error);
        });
        db.close();
        return val;
      })(),
      sleep(3000).then(() => 'timeout')
    ]);
    log('autosave written with image',
        saved !== 'timeout' && !!saved && !!saved.pages && !!saved.pages[0].images['0,0'],
        saved === 'timeout' ? 'indexeddb timeout' : '');

    // Expand + trim round trip
    doc.querySelector('.pocket[data-row="0"][data-col="0"]').dispatchEvent(new fr.MouseEvent('click', { bubbles: true }));
    fr.expandSlot('right');
    await sleep(50);
    log('expand right spans pocket 0,1', doc.querySelector('.pocket[data-row="0"][data-col="1"]').classList.contains('has-image'));
    fr.trimSlot('right');
    await sleep(50);
    log('trim right restores 1x1', !doc.querySelector('.pocket[data-row="0"][data-col="1"]').classList.contains('has-image'));

    // Rounded corners render as SVG paths (document content prints reliably)
    doc.getElementById('corner-mode').value = 'every';
    fr.updateCorners();
    await sleep(50);
    const overlays = doc.querySelectorAll('svg.corner-overlay path');
    log('corner overlays are SVG paths', overlays.length === 4, 'count=' + overlays.length);
    doc.getElementById('corner-mode').value = 'none';
    fr.updateCorners();

    // Print scale compensation: persists to localStorage and shows in the fit summary
    doc.getElementById('scale-comp-h').value = '99.5';
    doc.getElementById('scale-comp-v').value = '100.5';
    fr.updateScaleCompensation();
    const comp = JSON.parse(fr.localStorage.getItem('michify-print-scale'));
    log('scale compensation persisted', comp && comp.h === 99.5 && comp.v === 100.5,
        fr.localStorage.getItem('michify-print-scale'));
    fr.openPrintDialog();
    await sleep(200);
    const fitHtml = doc.getElementById('print-fit-result').innerHTML;
    log('compensation shown in print fit', fitHtml.indexOf('Scale compensation') >= 0 && fitHtml.indexOf('+0.50%') >= 0,
        fitHtml.replace(/<[^>]+>/g, ' ').slice(0, 160));
    // The 400px test image in a 68mm pocket is ~55 DPI; it must be listed by name
    log('low DPI images listed with location', fitHtml.indexOf('below 250 DPI') >= 0 && fitHtml.indexOf('R1C1') >= 0,
        fitHtml.replace(/<[^>]+>/g, ' ').replace(/&nbsp;/g, ' ').slice(-160));
    fr.closePrintDialog();
    doc.getElementById('scale-comp-h').value = '100';
    doc.getElementById('scale-comp-v').value = '100';
    fr.updateScaleCompensation();

    // --- v4.4 features ---

    // Binder preset applies dimensions and reports back in the selector
    // (12-pocket is 4 columns wide by 3 rows tall)
    doc.getElementById('binder-preset').value = 'p12';
    fr.applyBinderPreset();
    await sleep(50);
    log('preset 12-pocket applies 4 wide x 3 tall',
        doc.getElementById('rows').value === '3' && doc.getElementById('cols').value === '4' &&
        doc.querySelectorAll('.pocket').length === 12,
        'rows=' + doc.getElementById('rows').value + ' cols=' + doc.getElementById('cols').value);
    // Side-loading preset sets continuous seams
    doc.getElementById('binder-preset').value = 'side9';
    fr.applyBinderPreset();
    await sleep(50);
    log('side-loading preset sets continuous seams',
        doc.querySelectorAll('.seam-toggle.continuous').length === doc.querySelectorAll('.seam-toggle').length &&
        doc.getElementById('binder-preset').value === 'side9');
    // Back to standard for the rest
    doc.getElementById('binder-preset').value = 'std9';
    fr.applyBinderPreset();
    await sleep(50);
    log('preset selector syncs to std9 after manual edit', doc.getElementById('binder-preset').value === 'std9');

    // Zoom to fit changes the view scale to something that fits
    doc.getElementById('view-scale').value = '500';
    fr.updateBinder();
    fr.zoomToFit();
    await sleep(50);
    log('zoom to fit reduces zoom from 500%', parseInt(doc.getElementById('view-scale').value) < 500,
        'zoom=' + doc.getElementById('view-scale').value);

    // Add a couple of pages, reorder, and check thumbnails render
    fr.addPage();
    fr.addPage();
    await sleep(50);
    const pageCountBefore = doc.querySelectorAll('.page-item').length;
    log('three pages exist with thumbnails',
        pageCountBefore === 3 && doc.querySelectorAll('.page-thumb').length === 3 &&
        doc.querySelectorAll('.thumb-cell').length > 0);

    // Page label format + free rename (default "Page N (RxC)")
    log('default page label is "Page N (RxC)"',
        doc.querySelectorAll('.page-label')[0].textContent === 'Page 1 (3x3)',
        doc.querySelectorAll('.page-label')[0].textContent);
    fr.__test.renamePage(0, 'Pikachu');
    await sleep(30);
    log('custom name replaces the label freely', doc.querySelectorAll('.page-label')[0].textContent === 'Pikachu',
        doc.querySelectorAll('.page-label')[0].textContent);
    fr.__test.renamePage(0, 'x'.repeat(40));
    await sleep(20);
    log('name is capped at 20 chars', doc.querySelectorAll('.page-label')[0].textContent.length === 20,
        'len=' + doc.querySelectorAll('.page-label')[0].textContent.length);
    fr.__test.renamePage(0, '<b>x</b>');
    await sleep(30);
    const lbl = doc.querySelectorAll('.page-label')[0];
    log('page name is rendered as text not HTML',
        lbl.querySelector('b') === null && lbl.textContent === '<b>x</b>', lbl.textContent);
    fr.__test.renamePage(0, ''); // clear back to default
    await sleep(20);

    // Reorder: move page at index 2 to insertion index 1; current follows it
    fr.__test.movePageTo(2, 1);
    await sleep(50);
    log('reorder moves page and keeps it current',
        doc.querySelector('.page-item.active') === doc.querySelectorAll('.page-item')[1]);

    // PNG renderer produces a non-empty canvas for a page with an image
    fr.__test.switchPage(0);
    await sleep(50);
    const pngCanvas = await fr.__test.loadImageEls(fr.__test.state.pages[0]).then(els => fr.__test.renderPageToCanvas(fr.__test.state.pages[0], els));
    const pctx = pngCanvas.getContext('2d');
    const pix = pctx.getImageData(0, 0, pngCanvas.width, pngCanvas.height).data;
    let opaque = 0;
    for (let k = 3; k < pix.length; k += 4) { if (pix[k] > 0) { opaque++; break; } }
    log('PNG export renders non-empty canvas',
        pngCanvas.width > 0 && pngCanvas.height > 0 && opaque > 0,
        pngCanvas.width + 'x' + pngCanvas.height);

    // Touch: tap selects a pocket, drag pans a selected image, pinch zooms view
    const mkTouch = (el, x, y, id) => new fr.Touch({ identifier: id || 1, target: el, clientX: x, clientY: y });
    const area = doc.getElementById('canvas-area');
    const pocketEl = doc.querySelector('.pocket[data-row="1"][data-col="1"]');
    let rect = pocketEl.getBoundingClientRect();
    let cx = rect.left + rect.width / 2, cy = rect.top + rect.height / 2;
    let tp = mkTouch(pocketEl, cx, cy);
    area.dispatchEvent(new fr.TouchEvent('touchstart', { touches: [tp], changedTouches: [tp], bubbles: true, cancelable: true }));
    area.dispatchEvent(new fr.TouchEvent('touchend', { touches: [], changedTouches: [tp], bubbles: true, cancelable: true }));
    await sleep(50);
    log('touch tap selects pocket',
        fr.__test.state.selectedSlot && fr.__test.state.selectedSlot.row === 1 && fr.__test.state.selectedSlot.col === 1,
        JSON.stringify(fr.__test.state.selectedSlot));

    // Drag-pan the image in slot 0,0 (which has the pasted image)
    doc.querySelector('.pocket[data-row="0"][data-col="0"]').dispatchEvent(new fr.MouseEvent('click', { bubbles: true }));
    await sleep(30);
    const xBefore = fr.__test.currentPage().images['0,0'].xMm;
    // Re-query after the click: selecting re-renders and detaches the old node
    const imgPocket = doc.querySelector('.pocket[data-row="0"][data-col="0"]');
    rect = imgPocket.getBoundingClientRect();
    cx = rect.left + rect.width / 2; cy = rect.top + rect.height / 2;
    let d0 = mkTouch(imgPocket, cx, cy);
    area.dispatchEvent(new fr.TouchEvent('touchstart', { touches: [d0], changedTouches: [d0], bubbles: true, cancelable: true }));
    let d1 = mkTouch(imgPocket, cx + 25, cy);
    area.dispatchEvent(new fr.TouchEvent('touchmove', { touches: [d1], changedTouches: [d1], bubbles: true, cancelable: true }));
    area.dispatchEvent(new fr.TouchEvent('touchend', { touches: [], changedTouches: [d1], bubbles: true, cancelable: true }));
    await sleep(50);
    log('touch drag pans the image', fr.__test.currentPage().images['0,0'].xMm !== xBefore,
        'xBefore=' + xBefore.toFixed(1) + ' xAfter=' + fr.__test.currentPage().images['0,0'].xMm.toFixed(1));

    // Pinch zooms the view
    const zoomBefore = parseInt(doc.getElementById('view-scale').value);
    rect = area.getBoundingClientRect();
    const mx = rect.left + rect.width / 2, my = rect.top + rect.height / 2;
    let a0 = mkTouch(area, mx - 40, my, 1), a1 = mkTouch(area, mx + 40, my, 2);
    area.dispatchEvent(new fr.TouchEvent('touchstart', { touches: [a0, a1], changedTouches: [a0, a1], bubbles: true, cancelable: true }));
    let b0 = mkTouch(area, mx - 90, my, 1), b1 = mkTouch(area, mx + 90, my, 2);
    area.dispatchEvent(new fr.TouchEvent('touchmove', { touches: [b0, b1], changedTouches: [b0, b1], bubbles: true, cancelable: true }));
    area.dispatchEvent(new fr.TouchEvent('touchend', { touches: [b1], changedTouches: [b0], bubbles: true, cancelable: true }));
    area.dispatchEvent(new fr.TouchEvent('touchend', { touches: [], changedTouches: [b1], bubbles: true, cancelable: true }));
    await sleep(50);
    log('pinch spreads to zoom the view in', parseInt(doc.getElementById('view-scale').value) > zoomBefore,
        'before=' + zoomBefore + ' after=' + doc.getElementById('view-scale').value);

    // Drag reorder via pointer events: grab the page with the image (index 0)
    // and drop it last. Identity is checked via the thumbnail image cell,
    // since labels are position-based. Kept last so earlier image-dependent
    // tests run with page 0 intact.
    fr.__test.switchPage(0);
    await sleep(30);
    let items = doc.querySelectorAll('.page-item');
    let r0 = items[0].getBoundingClientRect();
    let rLast = items[items.length - 1].getBoundingClientRect();
    const pd = (type, y, el) => el.dispatchEvent(new fr.PointerEvent(type, { pointerId: 7, clientX: r0.left + 20, clientY: y, bubbles: true, cancelable: true, button: 0 }));
    pd('pointerdown', r0.top + 10, items[0]);
    pd('pointermove', rLast.bottom + 5, items[0]);
    await sleep(20);
    const indicatorShown = !!doc.querySelector('.page-item.drop-below, .page-item.drop-above');
    pd('pointerup', rLast.bottom + 5, items[0]);
    await sleep(50);
    items = doc.querySelectorAll('.page-item');
    const last = items[items.length - 1];
    log('drag reorder moves page to the end and shows indicator',
        indicatorShown && !!last.querySelector('.thumb-cell.has-image') &&
        doc.querySelector('.page-item.active') === last,
        'indicator=' + indicatorShown);

    // Security: loading a malicious project must not execute a payload, even
    // after opening the print dialog and selecting the image slot.
    fr.__xss = false;
    const evil = (h) => '<img src=x onerror="parent.frames[0].__xss=true;window.__xss=true">' + h;
    const evilProject = {
      app: 'michify', version: 2,
      cornerMode: 'outer',
      cornerRadius: evil('r'),
      imageMaxDim: evil('q'),
      currentPage: 0,
      pages: [{
        rows: 3, cols: 3, pocketW: 68, pocketH: 93, seamH: 2, seamV: 2,
        seamsH: ['cut', 'cut'], seamsV: ['cut', 'cut'], emptyPockets: [],
        images: { '0,0': { src: 'data:image/gif;base64,R0lGODlhAQABAAAAACwAAAAAAQABAAA=', widthMm: 100, xMm: 0, yMm: 0, rotate: 0, slotW: evil('w'), slotH: evil('h') } }
      }]
    };
    fr.__test.applyProjectData(evilProject);
    await sleep(100);
    fr.updatePrintFit();          // cornerRadius sink
    doc.querySelector('.pocket[data-row="0"][data-col="0"]').dispatchEvent(new fr.MouseEvent('click', { bubbles: true }));
    await sleep(150);             // slotW/slotH sink + any onerror
    const cr = fr.__test.state.cornerRadius;
    const sw = fr.__test.currentPage().images['0,0'].slotW;
    log('malicious project is sanitized and no payload runs',
        fr.__xss === false && !window.__xss && typeof cr === 'number' && typeof sw === 'number',
        'xss=' + fr.__xss + ' cornerRadius=' + cr + ' slotW=' + sw);
  } catch (e) {
    log('EXCEPTION', false, e.stack || String(e));
  }
  const fails = out.filter(l => l.startsWith('FAIL')).length;
  out.push('');
  out.push('RESULT: ' + (fails ? 'FAIL' : 'PASS'));
  const text = out.join('\n');
  document.getElementById('out').textContent = text;
  document.title = 'e2e: ' + (fails ? 'FAIL' : 'PASS');
  try { await fetch('/__report', { method: 'POST', body: text }); } catch {}
});
</script>
</body>
</html>
